<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>llamabat — Documentazione</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <style>
        /* ============================================
           TEMA CHIARO (Solarized)
           ============================================ */
        :root {
            --bg: #fdf6e3;
            --sidebar-bg: #eee8d5;
            --text: #657b83;
            --text-dark: #586e75;
            --link: #268bd2;
            --border: #ddd6c1;
            --pre-bg: #eee8d5;
            --active-bg: #268bd218;
            --overlay: #00000066;
        }

        /* ============================================
           TEMA SCURO (GitHub-style)
           ============================================ */
        :root[data-theme="dark"] {
            --bg: #0d1117;
            --sidebar-bg: #161b22;
            --text: #c9d1d9;
            --text-dark: #f0f6fc;
            --link: #58a6ff;
            --border: #30363d;
            --pre-bg: #161b22;
            --active-bg: #1f6feb22;
            --overlay: #000000aa;
        }

        /* ============================================
           RESET E BASE
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Scrollbar personalizzato (desktop + mobile) */
        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(128, 128, 128, 0.3);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(128, 128, 128, 0.5);
        }

        /* FIX #9: font-size base ridotto a 16px per compatibilità mobile */
        body {
            font-family: 'Segoe UI Variable Text', 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            font-size: 16px;
            line-height: 1.7;
            font-weight: 400;
        }

        /* ============================================
           LAYOUT PRINCIPALE
           ============================================ */
        .sidebar {
            width: 360px;
            background: var(--sidebar-bg);
            border-right: 2px solid var(--border);
            flex-shrink: 0;
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Wrapper scrollabile per il contenuto della sidebar */
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 8px;
        }

        .main {
            flex: 1;
            padding: 48px 120px;
            overflow-y: auto;
        }

        /* ============================================
           HEADER SEZIONI SIDEBAR
           ============================================ */
        .sidebar h2 {
            font-size: 18px;
            color: #586e75;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 24px 0 12px;
            padding: 8px 20px;
            font-weight: 700;
            text-align: center;
            border-top: 2px solid var(--border);
        }

        /* ============================================
           LINK NAVIGAZIONE SIDEBAR
           ============================================ */
        .sidebar a {
            display: flex;
            align-items: center;
            gap: 28px;
          padding: 10px 14px;
            color: var(--text);
            text-decoration: none;
            border-radius: 8px;
            margin: 4px 0;
            transition: all 0.2s ease;
        }

        .sidebar a:hover {
            background: var(--active-bg);
        }

        .sidebar a.active {
            background: var(--active-bg);
            color: var(--text);
            font-weight: 600;
        }

        .sidebar .nav-link {
            cursor: pointer;
        }

        .sidebar .nav-link:focus-visible {
            outline: 2px solid var(--link);
            outline-offset: -2px;
            border-radius: 8px;
        }

        .sidebar .nav-icon {
            width: 32px;
            text-align: center;
            font-size: 26px;
        }

        .sidebar .nav-label {
            font-size: 16px;
        }

        /* ============================================
           LOGO GITHUB
           ============================================ */
        .github-logo {
            display: flex;
            justify-content: center;
            margin: 8px 0 4px;
        }

        .github-logo svg {
            width: 32px;
            height: 32px;
            fill: var(--text);
        }

        /* ============================================
           CONTENUTO PRINCIPALE
           ============================================ */
        .main h1 {
            font-size: 32px;
            margin-bottom: 32px;
            color: var(--text-dark);
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            font-weight: 800;
        }

        .main h2 {
            font-size: 24px;
            margin: 40px 0 20px;
            color: var(--text-dark);
            font-weight: 800;
        }

        .main h3 {
            font-size: 20px;
            margin: 32px 0 16px;
            color: var(--text-dark);
            font-weight: 800;
        }

        .main p {
            margin-bottom: 20px;
            line-height: 1.8;
            word-wrap: break-word;
        }

        .main a {
            color: var(--text);
            text-decoration: none;
        }

        .main a:hover {
            text-decoration: underline;
        }

        .main code {
            background: var(--pre-bg);
            border: 1px solid var(--border);
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
        }

        .main pre {
            position: relative;
            background: var(--pre-bg);
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .main pre code {
            background: none;
            padding: 0;
            border: none;
            white-space: pre-wrap;
            word-wrap: break-word;
            display: block;
        }

        .main .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--border);
            color: var(--text-dark);
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .main .copy-btn:hover {
            opacity: 1;
        }

        .main ul,
        .main ol {
            margin: 0 0 20px 28px;
        }

        .main li {
            margin-bottom: 8px;
            line-height: 1.7;
        }

        .main blockquote {
            border-left: 3px solid var(--link);
            padding: 12px 20px;
            margin: 20px 0;
            background: var(--active-bg);
            border-radius: 0 8px 8px 0;
        }

        .main hr {
            display: none;
        }

        .main table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .main th,
        .main td {
            border: 1px solid var(--border);
            padding: 10px 16px;
            text-align: left;
        }

        .main th {
            background: var(--sidebar-bg);
            font-weight: 600;
        }

        .main img {
            max-width: 100%;
            border-radius: 8px;
        }

        .main strong {
            color: var(--text-dark);
            font-weight: 700;
        }

        .main em {
            color: #93a1a1;
        }

        .main .empty {
            color: #93a1a1;
            font-style: italic;
        }

        /* ============================================
           TOPBAR: hamburger + tema + fullscreen
           ============================================ */

        /* Gruppo bottoni topbar — sempre visibile */
        .topbar-group {
            display: flex;
            position: fixed;
            top: 16px;
            z-index: 100;
            gap: 8px;
            align-items: center;
            transition: opacity 0.3s ease;
        }
        .topbar-group.autohide {
            opacity: 0;
            pointer-events: none;
        }
        .topbar-group-left  { left: 16px; }
        .topbar-group-right { right: 16px; }

        /* Hamburger e fullscreen: solo mobile */
        #menuBtn,
        #fullscreenBtn {
            display: none;
        }

        /* Stile condiviso per tutti i bottoni topbar */
        .topbar-btn {
            background: var(--sidebar-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0;
            cursor: pointer;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
        }
        .topbar-btn svg {
            width: 20px;
            height: 20px;
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--overlay);
            z-index: 2;
        }

        .close-btn {
            display: none;
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text);
            padding: 8px;
            z-index: 5;
        }

      /* ============================================
           RESPONSIVE MOBILE
           ============================================ */

        /* Sidebar theme button: sempre nascosto (sostituito da topbar) */
        .theme-btn {
            display: none;
        }
@media (max-width: 768px) {
             #menuBtn,
             #fullscreenBtn {
                 display: flex;
             }

             .sidebar {
                 position: fixed;
                 top: 0;
                 left: -360px;
                 height: 100vh;
                 width: 300px;
                 z-index: 10;
                 transition: left 0.3s ease;
                 box-shadow: 4px 0 20px #00000044;
             }

             .sidebar.open {
                 left: 0;
             }

             .overlay.open {
                 display: block;
             }

             .close-btn {
                 display: block;
             }

             .main {
                 padding: 80px 24px 48px;
                 max-width: 100%;
             }

             .main table {
                display: block;
                width: 100%;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
        }
    </style>
</head>
<body>
    <!-- Topbar sinistra: hamburger (mobile) -->
    <div class="topbar-group topbar-group-left">
        <button class="topbar-btn" id="menuBtn" aria-label="Apri menu">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
        </button>
    </div>

    <!-- Topbar destra: tema (desktop) / tema + fullscreen (mobile) -->
    <div class="topbar-group topbar-group-right">
        <button class="topbar-btn" id="themeBtnMobile" aria-label="Cambia tema"></button>
        <button class="topbar-btn" id="fullscreenBtn" aria-label="Schermo intero"></button>
    </div>

    <!-- Overlay scuro per mobile -->
    <div class="overlay" id="overlay"></div>

    <!-- Sidebar: navigazione laterale -->
    <div class="sidebar" id="sidebar" role="navigation" aria-label="Navigazione">

        <div class="sidebar-content">
            <!-- Pulsante chiudi sidebar (mobile) -->
            <button class="close-btn" id="closeBtn" aria-label="Chiudi menu">✕</button>

            <!-- Logo GitHub -->
            <h2 style="margin-top: 0;">GitHub</h2>
            <a href="https://github.com/taphost/llamabat" target="_blank" rel="noopener" class="github-logo" aria-label="GitHub">
                <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                    <title>GitHub</title>
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.14 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
                </svg>
            </a>

            <!-- Sezione Esecuzione -->
            <h2>Esecuzione</h2>
            <div id="nav-primary" role="menu"></div>

            <!-- Sezione Configurazione -->
            <h2 style="margin-top: 24px;">Configurazione</h2>
            <div id="nav-config" role="menu"></div>

            <!-- Sezione Supporto -->
            <h2 style="margin-top: 24px;">Supporto</h2>
            <div id="nav-support" role="menu"></div>
        </div>

        <button class="theme-btn" id="themeBtn" aria-label="Cambia tema"></button>
    </div>

    <!-- Contenuto principale -->
    <div class="main">
        <div id="content"></div>
    </div>

    <script>
        // ============================================
        // CONFIGURAZIONE NAVIGAZIONE
        // ============================================

        const ICONS = {
            'file-text': '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>',
            'rocket': '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.25 22.25 0 0 1-3.95 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>',
            'list': '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/></svg>',
            'settings': '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>',
            'info': '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>',
'file': '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg>',
            'sun': '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M12 12v4"/><path d="M4 12h2"/><path d="M18 12h2"/><path d="m19.07 4.93-1.41 1.41"/><path d="m6.34 17.66-1.41 1.41"/></svg>',
            'moon': '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>',
            'check': '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
            'maximize': '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>',
            'minimize': '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>',
            'activity': '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>'
        };

        const primaryFiles = [
            { name: 'README.md', label: 'Home', icon: 'file-text' },
            { name: 'batches/llamacpp.bat', label: 'Avvia Server', icon: 'rocket' },
            { name: 'docs/guida-parametri-batch.md', label: 'Lista Parametri', icon: 'list' }
        ];

        const configFiles = [
            { name: 'docs/opencode-config.md', label: 'Configurazione OpenCode', icon: 'settings' },
            { name: 'docs/system-prompt-lmstudio.md', label: 'System Prompt LM Studio', icon: 'file-text' }
        ];

        const supportFiles = [
            { name: 'docs/problemi-comuni.md', label: 'Problemi Comuni', icon: 'activity' },
            { name: 'docs/info-index.md', label: 'Info Pagina', icon: 'info' }
        ];

        // ============================================
        // GESTIONE NAVIGAZIONE
        // ============================================

        function createNavItem(file) {
            const link = document.createElement('a');
            link.href = '#';
            link.className = 'nav-link';
            link.dataset.file = file.name;

            const icon = document.createElement('span');
            icon.className = 'nav-icon';
            icon.innerHTML = ICONS[file.icon] || ICONS['file'];
            link.appendChild(icon);

            const label = document.createElement('span');
            label.className = 'nav-label';
            label.textContent = file.label;
            link.appendChild(label);

            link.addEventListener('click', (event) => {
                event.preventDefault();
                setActiveLink(link);
                loadFile(file.name);
                if (isMobile()) {
                    closeSidebar();
                }
            });

            link.addEventListener('keydown', (event) => {
                const allLinks = Array.from(document.querySelectorAll('.sidebar a.nav-link'));
                const currentIndex = allLinks.indexOf(link);

                switch (event.key) {
                    case 'ArrowDown':
                        event.preventDefault();
                        if (currentIndex < allLinks.length - 1) {
                            allLinks[currentIndex + 1].focus();
                        }
                        break;
                    case 'ArrowUp':
                        event.preventDefault();
                        if (currentIndex > 0) {
                            allLinks[currentIndex - 1].focus();
                        }
                        break;
                    case 'Enter':
                    case ' ':
                        event.preventDefault();
                        link.click();
                        break;
                }
            });

            return link;
        }

        function setActiveLink(activeLink) {
            document.querySelectorAll('.sidebar a.nav-link').forEach(el => {
                el.classList.remove('active');
                el.removeAttribute('aria-current');
            });
            activeLink.classList.add('active');
            activeLink.setAttribute('aria-current', 'page');
        }

        function populateNav(container, files) {
            files.forEach(file => {
                container.appendChild(createNavItem(file));
            });
        }

        // ============================================
        // GESTIONE SIDEBAR MOBILE
        // ============================================

        function openSidebar() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('overlay').classList.add('open');
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('open');
        }

        function isMobile() {
            return window.innerWidth <= 768;
        }

        // ============================================
        // GESTIONE TEMA
        // ============================================

        const THEME_STORAGE_KEY = 'theme';
        const DEFAULT_THEME = 'dark';

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem(THEME_STORAGE_KEY, theme);
            updateThemeButton(theme);
        }

        function updateThemeButton(theme) {
            const icon = theme === 'dark' ? ICONS['sun'] : ICONS['moon'];
            document.getElementById('themeBtnMobile').innerHTML = icon;
        }

        function initTheme() {
            const savedTheme = localStorage.getItem(THEME_STORAGE_KEY) || DEFAULT_THEME;
            applyTheme(savedTheme);
        }

        // ============================================
        // GESTIONE CONTENUTO
        // ============================================

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function addCopyButtons() {
            document.querySelectorAll('.main pre').forEach(preBlock => {
                // Evita duplicati se addCopyButtons viene chiamato più volte
                if (preBlock.querySelector('.copy-btn')) return;

                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.textContent = 'Copia';

                copyBtn.addEventListener('click', () => {
                    const codeText = preBlock.querySelector('code')?.textContent || preBlock.textContent;
                    navigator.clipboard.writeText(codeText).then(() => {
                        copyBtn.textContent = 'Copiato!';
                        setTimeout(() => {
                            copyBtn.textContent = 'Copia';
                        }, 2000);
                    });
                });

                preBlock.appendChild(copyBtn);
            });
        }

        async function loadFile(filename) {
            const contentEl = document.getElementById('content');
            contentEl.innerHTML = '<p class="empty">Caricamento...</p>';

            try {
                const response = await fetch(filename);

                if (!response.ok) {
                    throw new Error('File non trovato');
                }

                const text = await response.text();

                if (isCodeFile(filename)) {
                    renderCodeFile(filename, text);
                } else {
                    renderMarkdown(text);
                }

                addCopyButtons();

            } catch (error) {
                renderError(filename, error.message);
            }
        }

        function isCodeFile(filename) {
            const codeExtensions = ['.bat', '.sh', '.js', '.py'];
            return codeExtensions.some(ext => filename.endsWith(ext));
        }

        function renderCodeFile(filename, text) {
            const contentEl = document.getElementById('content');
            const displayName = filename.split('/').pop();
            contentEl.innerHTML = `<h1>${escapeHtml(displayName)}</h1><pre><code>${escapeHtml(text)}</code></pre>`;
        }

        const EMOJI_TO_SVG = {
            '\u{1F4E6}': ICONS['file-text'],
            '\u{2753}': ICONS['info'],
            '\u{1F4CB}': ICONS['list'],
            '\u{1F4C1}': ICONS['file-text'],
            '\u{1F680}': ICONS['rocket'],
            '\u{1F5A5}': ICONS['file-text'],
            '\u{1F527}': ICONS['settings'],
            '\u{1F3AD}': ICONS['file-text'],
            '\u{1F4CA}': ICONS['list'],
            '\u{1F916}': ICONS['file-text'],
            '\u{1F517}': ICONS['file-text'],
            '\u{26A0}': ICONS['info'],
            '\u{1F4C4}': ICONS['file-text'],
            '\u{2705}': ICONS['check']
        };

        const EMOJI_REGEX = Object.entries(EMOJI_TO_SVG).map(([emoji]) => ({
            pattern: new RegExp(emoji, 'g'),
            replacement: EMOJI_TO_SVG[emoji]
        }));

        function replaceEmojis(text) {
            for (const { pattern, replacement } of EMOJI_REGEX) {
                text = text.replace(pattern, replacement);
            }
            return text;
        }

        function renderMarkdown(markdown) {
            const contentEl = document.getElementById('content');
            const rawHtml = marked.parse(replaceEmojis(markdown));
            const cleanHtml = DOMPurify.sanitize(rawHtml, {
                ADD_TAGS: ['svg', 'path', 'circle'],
                ADD_ATTR: ['xmlns', 'viewBox', 'fill', 'stroke', 'stroke-width',
                           'stroke-linecap', 'stroke-linejoin', 'd', 'cx', 'cy', 'r',
                           'width', 'height']
            });
            contentEl.innerHTML = cleanHtml;
        }

        function renderError(filename, message) {
            const contentEl = document.getElementById('content');
            contentEl.innerHTML = `
                <h1>Errore</h1>
                <p>Impossibile caricare <code>${escapeHtml(filename)}</code>: ${escapeHtml(message)}</p>
                <p>Verifica che il file esista e che il server supporti CORS.</p>
            `;
        }

        // ============================================
        // AUTO-HIDE TOPBAR MOBILE
        // ============================================

        const AUTOHIDE_DELAY = 3000;
        let autohideTimer = null;

        function startAutohide() {
            if (!isMobile()) return;
            clearTimeout(autohideTimer);
            document.querySelectorAll('.topbar-group').forEach(el => el.classList.remove('autohide'));
            autohideTimer = setTimeout(() => {
                document.querySelectorAll('.topbar-group').forEach(el => el.classList.add('autohide'));
            }, AUTOHIDE_DELAY);
        }

        function showTopbar() {
            if (!isMobile()) return;
            document.querySelectorAll('.topbar-group').forEach(el => el.classList.remove('autohide'));
            startAutohide();
        }

        // ============================================
        // INIZIALIZZAZIONE
        // ============================================

        document.addEventListener('DOMContentLoaded', function init() {
            populateNav(document.getElementById('nav-primary'), primaryFiles);
            populateNav(document.getElementById('nav-config'), configFiles);
            populateNav(document.getElementById('nav-support'), supportFiles);

            document.getElementById('menuBtn').addEventListener('click', openSidebar);
            document.getElementById('closeBtn').addEventListener('click', closeSidebar);
            document.getElementById('overlay').addEventListener('click', closeSidebar);

            initTheme();

            // Tema: topbar
            document.getElementById('themeBtnMobile').addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
            });

            // Fullscreen
            const fsBtn = document.getElementById('fullscreenBtn');
            function updateFullscreenIcon() {
                fsBtn.innerHTML = document.fullscreenElement
                    ? ICONS['minimize']
                    : ICONS['maximize'];
            }
            updateFullscreenIcon();
            fsBtn.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(() => {});
                } else {
                    document.exitFullscreen().catch(() => {});
                }
            });
            document.addEventListener('fullscreenchange', updateFullscreenIcon);

            const firstLink = document.querySelector('#nav-primary .nav-link');
            if (firstLink) setActiveLink(firstLink);

            // Auto-hide topbar
            const TOP_ZONE_HEIGHT = 80;
            document.addEventListener('click', (e) => {
                if (e.clientY <= TOP_ZONE_HEIGHT) {
                    showTopbar();
                }
            });

            startAutohide();

            loadFile('README.md');
        });
    </script>
</body>
</html>
